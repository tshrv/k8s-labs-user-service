# NOTE: values below are base64 ENCODING, not encryption - anyone with `kubectl get secret -o
# yaml` access (or this file) can trivially decode them. That satisfies the assignment's
# "don't hardcode plaintext in YAML" requirement, but for a real production cluster prefer
# `kubectl create secret generic --from-literal=...` (never rendered to a committed file),
# or an external secret store (GCP Secret Manager + the External Secrets / CSI driver,
# Sealed Secrets, SOPS). Treat this file as demo-only credentials.
#
# Values were generated once for this lab and are already base64 below - to regenerate:
#   printf '%s' '<value>' | base64 -w0

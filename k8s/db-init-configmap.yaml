# Schema mirrors migrations/versions/20250616_0001_create_users_table.py exactly.
# Assumption: this cluster has no migration runner (no init container/Job running
# `alembic upgrade head`), so this initdb script is the only schema-creation path here.
# It only runs once, on first boot, when the PVC's data directory is empty - Postgres
# skips /docker-entrypoint-initdb.d entirely on restarts where data already exists.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: user-service
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
        id VARCHAR(26) PRIMARY KEY,
        email VARCHAR(255) NOT NULL UNIQUE,
        username VARCHAR(50) NOT NULL UNIQUE,
        hashed_password VARCHAR(255) NOT NULL,
        full_name VARCHAR(100),
        is_active BOOLEAN NOT NULL DEFAULT true,
        is_superuser BOOLEAN NOT NULL DEFAULT false,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE UNIQUE INDEX IF NOT EXISTS ix_users_email ON users (email);
    CREATE UNIQUE INDEX IF NOT EXISTS ix_users_username ON users (username);

    -- Seed data: 8 demo users. Password hash below is a real bcrypt hash of "ChangeMe123!"
    -- (same hashing scheme app/api/v1/endpoints/users.py uses), so these rows look and
    -- behave exactly like rows the API itself would have created.

# FinOps/cost opportunity #1: idles at the 2-pod minimum during low-traffic periods instead of
# running 4 replicas around the clock, and only bursts to the 4-pod maximum when CPU demand
# actually justifies it.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: user-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    # Snappier scale-down: collapse back to the minimum ~30s after load
    # drops, instead of waiting out the default 5-minute stabilization window.
    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30

# FinOps/cost opportunity #1: scales the app tier down to 2 pods (from the 4 baseline)
# during low-traffic periods instead of paying for 4 idle replicas around the clock, and
# only bursts back to 4 when CPU demand actually justifies it.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: user-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
